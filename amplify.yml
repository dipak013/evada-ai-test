version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # NEXT_PUBLIC_API_BASE_URL is injected by Amplify Console App settings → Environment variables.
        - npm run build
  artifacts:
    # next/standalone + next/static for SSR deployments, or .next for server-side.
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
